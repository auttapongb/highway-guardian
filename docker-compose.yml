# HWAY GUARDIAN 2.0
#
# docker compose up -d  # Start all services
# docker compose logs -f  # Watch logs

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - DATABASE_URL=postgresql://hguardian:hguardian@db:5432/hguardian
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  line-bot:
    build:
      context: .
      dockerfile: Dockerfile.linebot
    ports:
      - "5000:5000"
    environment:
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=hguardian
      - POSTGRES_PASSWORD=hguardian
      - POSTGRES_DB=hguardian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hguardian"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
